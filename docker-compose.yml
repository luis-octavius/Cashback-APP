version: "3.9"

services:
  db:
    image: postgres:16
    container_name: cashback-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cashback
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cashback"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
